name: Refresh podcast feed

on:
  workflow_dispatch:
  schedule:
    - cron: "20 15 * * *"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Rebuild feed mirror
        run: python scripts/build_feed.py
      - name: Commit refreshed feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          git diff --cached --quiet || git commit -m "Refresh podcast feed mirror"
          git push
